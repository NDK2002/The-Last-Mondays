<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Last Mondays</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #0f172a, #312e81);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease, background 0.4s ease;
            animation: float 6s ease-in-out infinite, fadeUp 1s ease-out forwards;
        }

        .glass:hover {
            transform: translateY(-8px) scale(1.03);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(40px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .number-glow {
            text-shadow: 0 0 20px rgba(96, 165, 250, 0.5), 0 0 40px rgba(96, 165, 250, 0.3);
            animation: pulseGlow 3s ease-in-out infinite alternate;
        }

        @keyframes pulseGlow {
            from {
                text-shadow: 0 0 10px rgba(96, 165, 250, 0.4), 0 0 20px rgba(96, 165, 250, 0.2);
            }

            to {
                text-shadow: 0 0 30px rgba(96, 165, 250, 0.9), 0 0 50px rgba(96, 165, 250, 0.5), 0 0 70px rgba(96, 165, 250, 0.3);
            }
        }

        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: rise linear infinite;
        }

        @keyframes rise {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateY(-10vh) scale(1);
                opacity: 0;
            }
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen relative">

    <div id="particles"></div>

    <div class="glass p-12 rounded-3xl shadow-2xl text-center max-w-md w-full relative z-10 mx-4">
        <h1 class="text-xl font-light text-slate-300 mb-2 tracking-wide">Số ngày Thứ Hai còn lại</h1>
        <div id="year-label" class="text-sm font-bold text-blue-400 uppercase tracking-widest mb-6 opacity-80">...</div>

        <div id="monday-count" class="text-9xl font-black text-white mb-8 number-glow">00</div>

        <div class="relative max-w-[280px] mx-auto mb-2">
            <span class="text-4xl text-blue-500 opacity-40 absolute -top-4 -left-6 font-serif">"</span>
            <p class="text-slate-300 italic text-sm opacity-90 leading-relaxed relative z-10">
                Mỗi ngày Thứ Hai là một cơ hội mới để bắt đầu lại.
            </p>
            <span class="text-4xl text-blue-500 opacity-40 absolute -bottom-6 -right-6 font-serif">"</span>
        </div>

        <div
            class="mt-10 pt-6 border-t border-slate-700/50 text-xs text-slate-400 tracking-wider font-light flex items-center justify-center gap-2">
            <span
                class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse shadow-[0_0_8px_rgba(52,211,153,0.8)]"></span>
            Hệ thống Server | Cập nhật Real-time
        </div>
    </div>

    <script>
        // Number counting animation
        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                // easeOutQuart
                const easeProgress = 1 - Math.pow(1 - progress, 4);
                obj.innerHTML = Math.floor(easeProgress * (end - start) + start).toString().padStart(2, '0');
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        function getMondaysLeft() {
            const today = new Date();
            const currentYear = today.getFullYear();
            const lastDayOfYear = new Date(currentYear, 11, 31);

            let count = 0;
            let tempDate = new Date(today);

            // Start calculating from tomorrow
            tempDate.setDate(tempDate.getDate() + 1);

            while (tempDate <= lastDayOfYear) {
                if (tempDate.getDay() === 1) { // 1 is Monday
                    count++;
                }
                tempDate.setDate(tempDate.getDate() + 1);
            }

            return { count, currentYear };
        }

        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 25;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';

                // Randomize particle properties
                const size = Math.random() * 4 + 1; // 1px to 5px
                const left = Math.random() * 100; // 0% to 100%
                const duration = Math.random() * 15 + 10; // 10s to 25s
                const delay = Math.random() * 15; // 0s to 15s
                const blur = Math.random() * 3;

                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${left}%`;
                particle.style.animationDuration = `${duration}s`;
                particle.style.animationDelay = `-${delay}s`; // negative delay so some start immediately visible
                if (blur > 0) {
                    particle.style.filter = `blur(${blur}px)`;
                }

                particlesContainer.appendChild(particle);
            }
        }

        // Initialize content
        document.addEventListener('DOMContentLoaded', () => {
            const data = getMondaysLeft();
            document.getElementById('year-label').innerText = `NĂM ${data.currentYear}`;

            const countElement = document.getElementById('monday-count');

            // Start counter animation after a small delay corresponding to the fade-in of the card
            setTimeout(() => {
                animateValue(countElement, 0, data.count, 2500);
            }, 400);

            createParticles();
        });
    </script>
</body>

</html>
