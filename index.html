<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Last Mondays</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="flex items-center justify-center min-h-screen relative bg-slate-900 text-white">

    <div id="particles"></div>

    <div class="glass p-12 rounded-3xl shadow-2xl text-center max-w-md w-full relative z-10 mx-4">
        <h1 class="text-xl font-light text-slate-300 mb-2 tracking-wide">Số ngày Thứ Hai còn lại</h1>
        <div id="year-label" class="text-sm font-bold text-blue-400 uppercase tracking-widest mb-6 opacity-80">...</div>

        <div id="monday-count" class="text-9xl font-black text-white mb-8 number-glow">00</div>

        <div class="relative max-w-[280px] mx-auto mb-2">
            <span class="text-4xl text-blue-500 opacity-40 absolute -top-4 -left-6 font-serif">"</span>
            <p class="text-slate-300 italic text-sm opacity-90 leading-relaxed relative z-10">
                Mỗi ngày Thứ Hai là một cơ hội mới để bắt đầu lại.
            </p>
            <span class="text-4xl text-blue-500 opacity-40 absolute -bottom-6 -right-6 font-serif">"</span>
        </div>

        <div
            class="mt-10 pt-6 border-t border-slate-700/50 text-xs text-slate-400 tracking-wider font-light flex items-center justify-center gap-2">
            <span class="w-2 h-2 rounded-full bg-blue-400 animate-pulse shadow-[0_0_8px_rgba(96,165,250,0.8)]"></span>
            Đếm ngược thời gian | Trân trọng từng khoảnh khắc
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
